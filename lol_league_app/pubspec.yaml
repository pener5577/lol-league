name: lol_league_app
description: "英雄联盟业余联赛平台"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状态管理
  provider: ^6.1.2

  # 网络请求
  dio: ^5.4.3+1

  # 本地存储
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # 路由
  go_router: ^14.2.7

  # UI 组件
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  pull_to_refresh: ^2.0.0

  # 图片选择
  image_picker: ^1.1.2

  # 工具
  intl: ^0.19.0
  timeago: ^3.7.1

  # Excel 处理
  excel: ^4.0.6
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
